name: ci
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check src
      - run: pylint src/nasa_defense
      - name: Smoke-test the generated Pages site
        run: >-
          python -c "from pathlib import Path;
          from nasa_defense.site import write;
          write(Path('state'), Path('/tmp/nasa-defense-site'))"
