name: watch
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so "Commit state" can rebase onto a moved main without
          # tripping over a shallow boundary. The repo is tiny; this costs nothing.
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
      - run: pip install -e "."
      - name: Run watcher
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Optional fan-out channels (inactive unless the secret is set)
          FANOUT_WEBHOOK_URL: ${{ secrets.FANOUT_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python -m nasa_defense
      # These run even when the watcher exits non-zero. A failing run has still earned
      # the state its healthy sources produced, and has still recorded how long the
      # unhealthy ones have been down — discarding that on the ephemeral runner would
      # re-detect (and re-notify) the same events next run, and would reset the
      # consecutive-failure counter that decides when an outage becomes a hard failure.
      - name: Commit state
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          git config user.name "nasa-defense-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/
          if git diff --cached --quiet -- state/; then
            echo "state unchanged; nothing to commit"
            exit 0
          fi
          git commit -m "chore: update state [skip ci]"
          # main can move while we run — a human push, or an overlapping dispatch — and
          # a bare push would then be rejected non-fast-forward, discarding a state
          # commit whose work is already done. The bot only ever touches state/, so
          # replaying it on top of whatever landed is always safe.
          # Explicit refspecs throughout: never depend on the checkout's upstream
          # tracking config being set up the way we assume.
          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "push rejected (attempt ${attempt}/3); rebasing onto origin/${GITHUB_REF_NAME}"
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase FETCH_HEAD
          done
          echo "::error::could not push state after 3 rebase attempts"
          exit 1
      - name: Upload Pages artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-pages-artifact@v5
        continue-on-error: true
        with:
          path: site

  publish:
    needs: watch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
