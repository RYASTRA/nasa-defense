name: Mirror to GitLab

on: [push, delete]

# Least privilege: this workflow only reads the repo to mirror it, and pushes to GitLab
# with GITLAB_TOKEN — it never uses GITHUB_TOKEN to write back. Pin the token to read so
# a compromised third-party action can't inherit the repo's default write scope.
permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for mirroring history

      - name: Mirror to GitLab
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/RYASTRA/nasa-defense.git